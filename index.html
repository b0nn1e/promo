<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шершні Довбуша</title>
    <meta
      name="description"
      content="Система розгортається. Новий сайт Шершнів Довбуша вже в роботі."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@400;600&family=Russo+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero__bg" aria-hidden="true"></div>

        <header class="logo fade-in-up">
          <img src="./assets/logo.png" alt="Логотип Шершні Довбуша" />
        </header>

        <div class="hero__body">
          <aside class="left fade-in-up">
            <img
              class="left__illustration"
              src="./assets/left-illustration.png"
              alt="Ілюстрація з дроном"
            />
            <nav class="socials" aria-label="Соціальні мережі">
              <a
                href="https://t.me/s/shershni68"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Telegram"
              >
                <img src="./assets/social-telegram.svg" alt="" />
              </a>
              <a
                href="https://instagram.com/shershni.68"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Instagram"
              >
                <img src="./assets/social-instagram.svg" alt="" />
              </a>
              <a
                href="https://www.youtube.com/@ShershniDovbusha"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="YouTube"
              >
                <img src="./assets/social-youtube.svg" alt="" />
              </a>
              <a
                href="https://facebook.com/profile.php?id=61584607762171"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Facebook"
              >
                <img src="./assets/social-facebook.svg" alt="" />
              </a>
            </nav>
          </aside>

          <div class="center fade-in-up">
            <div class="heading">
              <h1>СИСТЕМА РОЗГОРТАЄТЬСЯ</h1>
              <p>Новий сайт “Шершнів Довбуша” вже в роботі</p>
            </div>
            <img class="cube" src="./assets/cube.png" alt="Символіка Шершнів" />
          </div>

          <aside class="right fade-in-up">
            <a class="right__contacts" href="tel:+380676868861">
              <img
                src="./assets/contacts.png"
                alt="Питати можуть всі. Долучайся: +38 067 68 68 61"
              />
            </a>

            <div class="donate">
              <picture>
                <source
                  media="(max-width: 520px)"
                  srcset="./assets/donate-mobile.png"
                />
                <img src="./assets/donate.png" alt="Скануй та підтримуй" />
              </picture>
            </div>
          </aside>
        </div>

        <footer class="copyright">
          <p>
            © <span id="year">2026</span> Шершні Довбуша<br />
            Всі права захищено
          </p>
        </footer>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
